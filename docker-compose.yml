

services:
  web:
    build: .
    restart: always
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - rabbitmq
    volumes:
      - static_volume:/app/staticfiles
      - ./media:/app/media
    expose:
      - "8000"

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-django_db}
      POSTGRES_USER: ${POSTGRES_USER:-django_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    expose:
      - "6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-alpine
    restart: always
    expose:
      - "5672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}

  celery-worker:
    build: .
    restart: always
    command: celery -A A worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - rabbitmq
    volumes:
      - ./media:/app/media

  celery-beat:
    build: .
    restart: always
    command: celery -A A beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - rabbitmq
      - celery-worker
    volumes:
      - ./media:/app/media

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
    depends_on:
      - web
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - ./media:/app/media

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  static_volume: