{% load static %}

<nav class="navbar">
    <div class="container">
        <div class="navbar-content">

            <!-- Logo -->
            <a href="{% url 'home:home' %}" class="navbar-brand">
                <i class="fas fa-store"></i>
                گالری
            </a>

            <!-- Simple Menu -->
            <ul class="navbar-menu">
                <li><a href="{% url 'home:home' %}">خانه</a></li>
                {% if request.user.is_authenticated %}
                    <li><a href="{% url 'accounts:user_logout' %}">خروج</a></li>
                {% else %}
                    <li><a href="{% url 'accounts:user_login' %}">ورود</a></li>
                    <li><a href="{% url 'accounts:user_register' %}">ثبت نام</a></li>
                {% endif %}

                {% if request.user.is_admin %}
                    <li><a href="{% url 'home:bucket' %}">bucket</a></li>
                {% endif %}
            </ul>

            <!-- Right Side (Minimal) -->
            <div class="navbar-right">
                <a href="{% url 'orders:cart' %}" class="nav-icon cart-icon" title="سبد خرید">
                    <i class="fas fa-shopping-cart"></i> {{ cart|length }}
                </a>

                <a href="{% url 'accounts:profile' %}" class="nav-icon" title="حساب کاربری">
                    <i class="fas fa-user"></i>
                </a>
            </div>
        </div>
    </div>
</nav>
