{% extends 'base.html' %}

{% block content %}
    <h3>بازیابی رمز عبور با پیامک</h3>
    <p>شماره تلفن خود را وارد کنید تا لینک بازیابی برای شما ارسال شود.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">ارسال لینک</button>
    </form>
    <p><a href="{% url 'accounts:user_reset_password' %}">بازیابی با ایمیل</a></p>
{% endblock %}
