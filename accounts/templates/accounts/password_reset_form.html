{% extends 'base.html' %}
{% load static %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'accounts/css/password_reset.css' %}">
{% endblock %}

{% block content %}
<div class="reset-card">
    <h3>بازیابی رمز عبور</h3>
    <p>ایمیل خود را وارد کنید تا لینک بازیابی برای شما ارسال شود.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-reset">ارسال لینک</button>
    </form>
    <a href="{% url 'accounts:password_reset_sms' %}" class="switch-method">بازیابی با پیامک</a>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{% static 'accounts/js/password_reset.js' %}"></script>
{% endblock %}
