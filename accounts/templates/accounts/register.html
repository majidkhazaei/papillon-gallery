{% extends 'base.html' %}
{% load static %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'accounts/css/register.css' %}">
{% endblock %}

{% block content %}
<div class="register-card">
    <h2>ثبت‌نام</h2>
    <p>لطفاً اطلاعات خود را وارد کنید</p>

    <form action="" method="post">
        {% csrf_token %}
        {{ form }}
        <input type="submit" value="register" class="btn-register">
    </form>
</div>
{% endblock %}
