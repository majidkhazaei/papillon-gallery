{% extends 'base.html' %}
{% load static %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'accounts/css/profile_edit.css' %}">
{% endblock %}

{% block content %}
<div class="profile-edit-container">
    <h2>ویرایش پروفایل</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="btn-group">
            <button type="submit" class="btn-save">💾 ذخیره تغییرات</button>
            <a href="{% url 'accounts:profile' %}" class="btn-back">🔙 بازگشت</a>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{% static 'accounts/js/profile.js' %}"></script>
{% endblock %}
