{% extends 'base.html' %}
{% load static %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'accounts/css/password_reset.css' %}">
{% endblock %}

{% block content %}
<div class="reset-card">
    <div class="message-icon">✅</div>
    <h3>رمز عبور تغییر کرد</h3>
    <p>رمز عبور شما با موفقیت تغییر یافت. اکنون می‌توانید وارد حساب کاربری خود شوید.</p>
    <a href="{% url 'accounts:user_login' %}" class="btn-reset" style="text-decoration:none; display:inline-block; width:auto; padding:0.5rem 1.5rem;">ورود به حساب</a>
</div>
{% endblock %}
