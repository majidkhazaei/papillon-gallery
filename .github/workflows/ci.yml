name: Django CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Set environment variables for decouple
      run: |
        echo "SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}" >> $GITHUB_ENV
        echo "DEBUG=False" >> $GITHUB_ENV
        echo "ARVAN_ACCESS_KEY=${{ secrets.ARVAN_ACCESS_KEY }}" >> $GITHUB_ENV
        echo "ARVAN_SECRET_KEY=${{ secrets.ARVAN_SECRET_KEY }}" >> $GITHUB_ENV
        echo "ARVAN_ENDPOINT=https://s3.ir-tbz-sh1.arvanstorage.ir" >> $GITHUB_ENV
        echo "ARVAN_BUCKET=onlinshop" >> $GITHUB_ENV
        echo "ZP_API_REQUEST=https://payment.zarinpal.com/pg/v4/payment/request.json" >> $GITHUB_ENV
        echo "ZP_API_VERIFY=https://payment.zarinpal.com/pg/v4/payment/verify.json" >> $GITHUB_ENV
        echo "ZP_MERCHANT_ID=${{ secrets.ZP_MERCHANT_ID }}" >> $GITHUB_ENV
        echo "EMAIL_HOST_PASSWORD=${{ secrets.EMAIL_HOST_PASSWORD }}" >> $GITHUB_ENV
        echo "EMAIL_HOST_USER=${{ secrets.EMAIL_HOST_USER }}" >> $GITHUB_ENV
        echo "apikey=${{ secrets.APIKEY }}" >> $GITHUB_ENV
        echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> $GITHUB_ENV

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create logs directory
      run: mkdir -p logs

    - name: Run tests
      run: |
        python manage.py test
